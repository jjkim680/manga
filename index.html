<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manga Map</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: sans-serif; }
        #chart-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .node { cursor: grab; stroke: #222; stroke-width: 2px; transition: filter 0.3s ease; }
        .node:active { cursor: grabbing; }
        .node:hover {
            stroke: white; /* Highlights the bubble when hovering */
            cursor: pointer; /* Changes the hand icon to a clicking pointer */
        }
    </style>
</head>
<body>
    <div id="chart-container"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
