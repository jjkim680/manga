<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>My Manga Library</h1>
    <div class="manga-grid" id="grid"></div>

    <script>
        // Fetch the JSON file your Python script generated
        fetch('manga_data.json')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('grid');
                
                // Loop through each manga in your library
                // This forces the dictionary to become an array of manga objects
                Object.values(data).forEach(manga => {
                    // Create the HTML for the bubble
                    const bubble = document.createElement('div');
                    bubble.className = 'manga-bubble';
                    
                    // Determine if we need to show the unread badge
                    const isRead = manga.caught_up || true;
                                        
                    // If isRead is false, apply grayscale. Otherwise, no extra class.
                    const imageClass = isRead === false ? 'grayscale' : '';

                    bubble.innerHTML = `
                        <img src="${manga.coverUrl || 'https://via.placeholder.com/200x280?text=No+Cover'}" alt="Cover">
                        <div class="manga-info">
                            <h3>${manga.title || 'Unknown Title'}</h3>
                        </div>
                    `;
                    grid.appendChild(bubble);
                });
            })
            .catch(error => console.error('Error loading manga data:', error));
    </script>
</body>
</html>
